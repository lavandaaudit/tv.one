<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ibonarium.tv | STREAMING</title>
    <link rel="stylesheet" href="css/tv_minimal.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="tv-only-body">
    <div class="tv-header-logo">
        ibonarium<span>.tv</span>
    </div>

    <!-- Video Workspace -->
    <div class="tv-hero-player">
        <video id="tv-player" autoplay muted playsinline></video>
        
        <div class="tv-hud-overlay">
            <div class="tv-now-playing">
                <span class="live-dot"></span> LIVE ARCHIVE / <span id="v-id">#1</span>
            </div>
        </div>

        <!-- Scrollable Vertical Playlist -->
        <div class="tv-playlist-side">
            <div class="tv-playlist-grid" id="tv-list">
                <!-- Video buttons injected here -->
            </div>
        </div>
    </div>

    <script src="js/tv_logic.js"></script>
</body>
</html>
